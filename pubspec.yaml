name: zrok_mobile
description: "Zrok Mobile App — manage zrok tunnels from your phone."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State & Navigation
  provider: ^6.1.2
  go_router: ^13.2.0

  # Persistence
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  http: ^1.2.0
  path_provider: ^2.1.0

  # Platform Services
  connectivity_plus: ^6.0.0
  share_plus: ^10.0.0
  flutter_local_notifications: ^18.0.0
  flutter_foreground_task: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
